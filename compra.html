<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gambiarra Quest - Pagamento</title>
    <link rel="stylesheet" href="compra.css">
</head>
<body>
 
    <!-- NAVBAR -->
    <header class="cabecalho">
        <div class="logo-mini">
            <img src="img/Captura de tela 2026-05-25 220121.png" alt="Gambiarra Quest" class="logo-mini-img">
        </div>
        <nav class="menu-topo">
            <a href="loja.html">Loja</a>
            <a href="comunidade.html">Comunidade</a>
            <a href="biblioteca.html">Biblioteca</a>
            <a href="Suporte.html">Suporte</a>
        </nav>
        <div class="busca">
            <span>🔍</span>
            <input type="text" placeholder="Buscar">
        </div>
    </header>
 
  
 
    <!-- ÁREA DE CHECKOUT -->
    <div class="container" id="areaCheckout">
 
        <div class="breadcrumb">
            <a href="biblioteca.html">Biblioteca</a>
            <span>›</span>
            <span id="breadcrumbJogo">Jogo</span>
            <span>›</span>
            Pagamento
        </div>
 
        <h1 class="titulo-pagina">Finalizar compra</h1>
 
        <div class="checkout-grid">
 
            <!-- COLUNA ESQUERDA -->
            <div class="coluna-esquerda">
 
                <!-- Card do jogo -->
                <div class="card-jogo">
                  
                    <div class="info-jogo">
                        <h2 class="nome-jogo" id="nomeJogo">—</h2>
                        <p class="genero-jogo" id="generoJogo">JOGO GAMBIARRA QUEST</p>
                        <span class="preco-jogo" id="precoJogo">—</span>
                    </div>
                </div>
 
                <!-- Formulário de pagamento -->
                <div class="form-pagamento">
                    <h3 class="form-titulo">Método de pagamento</h3>
 
                    <div class="abas">
                        <button class="aba ativa" onclick="trocarAba('cartao', this)">💳 Cartão</button>
                        <button class="aba" onclick="trocarAba('pix', this)">⚡ Pix</button>
                        <button class="aba" onclick="trocarAba('boleto', this)">🧾 Boleto</button>
                    </div>
 
                    <!-- CARTÃO -->
                    <div class="conteudo-aba" id="abaCartao">
                        <div class="campo">
                            <label>NÚMERO DO CARTÃO</label>
                            <input type="text" placeholder="0000 0000 0000 0000" maxlength="19" oninput="mascaraCartao(this)">
                        </div>
                        <div class="campo">
                            <label>NOME NO CARTÃO</label>
                            <input type="text" placeholder="Como está no cartão" style="text-transform:uppercase">
                        </div>
                        <div class="linha-dupla">
                            <div class="campo">
                                <label>VALIDADE</label>
                                <input type="text" placeholder="MM/AA" maxlength="5" oninput="mascaraData(this)">
                            </div>
                            <div class="campo">
                                <label>CVV</label>
                                <input type="text" placeholder="•••" maxlength="3">
                            </div>
                        </div>
                        <div class="campo">
                            <label>PARCELAS</label>
                            <select>
                                <option>1x sem juros</option>
                                <option>2x sem juros</option>
                                <option>3x sem juros</option>
                            </select>
                        </div>
                    </div>
 
                >
 
            <!-- COLUNA DIREITA: resumo -->
            <div class="resumo-box">
                <h3 class="form-titulo">Resumo do pedido</h3>
                <div class="resumo-linha">
                    <span id="resumoNome">—</span>
                    <span class="resumo-val" id="resumoPreco">—</span>
                </div>
                <div class="resumo-linha">
                    <span>Desconto</span>
                    <span class="resumo-val">R$ 0,00</span>
                </div>
                <div class="resumo-linha total">
                    <span>Total</span>
                    <span class="resumo-val" id="resumoTotal">—</span>
                </div>
                <button class="btn-pagar" id="btnPagar" onclick="confirmar()">Confirmar pagamento</button>
                <p class="nota-seguranca">🔒 Ambiente seguro · Dados fictícios</p>
            </div>
 
        </div>
    </div>
 
   
           
        }
    </script>
 
</body>
</html>
