<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gambiarra Quest - Login</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="img/Captura de tela 2026-05-25 220121.png" alt="Gambiarra Quest" class="logo-img">
        </div>

        <form class="formulario">
            <div class="campo">
               
                <input type="email" id="email" name="email" placeholder="Email:">
            </div>

            <div class="campo">
               
                <input type="tel" id="telefone" name="telefone" placeholder="Telefone:">
            </div>

            <div class="campo">
             
                <input type="password" id="senha" name="senha" placeholder="Senha:">
            </div>

            <div class="campo">
          
                <input type="text" id="cpf" name="cpf" placeholder="Cpf:">
            </div>

            <div class="botoes">
                <button type="submit" class="btn"><a href="loja.html">Entrar</a></button>
                <button type="button" class="btn"><a href="loja.html">Cadastrar</a></button>
            </div>
        </form>
    </div>
</body>
</html>
